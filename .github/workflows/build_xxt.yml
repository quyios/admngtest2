name: Build XXTouch Tweak

on:
  push:
    paths:
      - 'XXT_Tweak/**'
      - 'build_xxt.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Setup SDK
        run: |
          git clone https://github.com/theos/sdks.git $HOME/sdks
          mkdir -p $HOME/theos/sdks
          cp -r $HOME/sdks/iPhoneOS14.5.sdk $HOME/theos/sdks/
          rm -rf $HOME/sdks

      - name: Install ldid
        run: |
          brew install ldid

      - name: Build Tweak
        run: |
          export THEOS=$HOME/theos
          cd XXT_Tweak
          make FINALPACKAGE=1
        env:
          THEOS: ${{ env.THEOS }}

      - name: Upload Dylib Artifact
        uses: actions/upload-artifact@v4
        with:
          name: XXTHavocSpoof-Dylib
          path: XXT_Tweak/.theos/obj/arm64/XXTHavocSpoof.dylib
